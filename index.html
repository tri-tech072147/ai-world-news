<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="世界のAIニュースを日本語で読む — AI World News">
<title>AI World News — 世界のAIニュース</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #f0eeea;
    --text: #1a1a18;
    --text-secondary: #5a5a56;
    --text-tertiary: #9a9a94;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --accent: #185fa5;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text: #f0eeea;
      --text-secondary: #a8a8a0;
      --text-tertiary: #6a6a64;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.18);
      --accent: #5ba3e8;
    }
    .tag-model { background: #1e2261 !important; color: #7e9ef5 !important; }
    .tag-policy { background: #0d3320 !important; color: #5cc98a !important; }
    .tag-business { background: #332800 !important; color: #fbb740 !important; }
    .tag-research { background: #3a0d22 !important; color: #f08ab0 !important; }
    .tag-safety { background: #00261f !important; color: #4dc9af !important; }
    .badge-live { background: #0d3320 !important; color: #5cc98a !important; }
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .page-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ── Header ── */
  .header {
    padding: 28px 0 20px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 20px;
  }
  .header-top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .site-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.8px;
  }
  .site-sub { font-size: 13px; color: var(--text-tertiary); }
  .header-meta {
    display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap;
  }
  .badge-live {
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    background: #e8f5e9; color: #2e7d32;
    letter-spacing: 0.3px;
  }
  .updated { font-size: 12px; color: var(--text-tertiary); }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 16px; align-items: center;
  }
  .filter-btn {
    font-size: 12px; padding: 6px 14px; border-radius: 20px;
    border: 0.5px solid var(--border-mid);
    background: var(--bg); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:hover { background: var(--bg-secondary); color: var(--text); }
  .filter-btn.active {
    background: var(--text); color: var(--bg);
    border-color: var(--text);
  }
  .refresh-btn {
    margin-left: auto; font-size: 12px; padding: 6px 14px;
    border-radius: 20px; border: 0.5px solid var(--border-mid);
    background: var(--bg); color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: all 0.15s; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .refresh-btn:hover { color: var(--text); }
  .spin { display: inline-block; }
  .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Stats ── */
  .stats-bar {
    display: flex; gap: 20px; margin-bottom: 16px;
    flex-wrap: wrap; padding: 10px 14px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
  }
  .stat { font-size: 12px; color: var(--text-secondary); }
  .stat strong { color: var(--text); font-weight: 600; }

  /* ── News Card ── */
  .news-grid { display: flex; flex-direction: column; gap: 10px; }

  .news-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .news-card:hover {
    border-color: var(--border-mid);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card-meta {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .country-flag { font-size: 16px; line-height: 1; }
  .country-label {
    font-size: 11px; font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    padding: 2px 8px; border-radius: 10px;
    border: 0.5px solid var(--border);
  }
  .category-tag {
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
  }
  .tag-model    { background: #e8eaf6; color: #283593; }
  .tag-policy   { background: #e8f5e9; color: #1b5e20; }
  .tag-business { background: #fff8e1; color: #e65100; }
  .tag-research { background: #fce4ec; color: #880e4f; }
  .tag-safety   { background: #e0f2f1; color: #004d40; }

  .pub-date {
    font-size: 11px; color: var(--text-tertiary);
    margin-left: auto; white-space: nowrap;
  }

  .card-title {
    font-size: 16px; font-weight: 600;
    color: var(--text); line-height: 1.45;
    margin-bottom: 10px;
  }

  .card-summary {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.65; margin-bottom: 12px;
    border-left: 2px solid var(--border-mid);
    padding-left: 12px;
  }

  .card-body {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.7; margin-bottom: 12px;
    display: none; padding-top: 8px;
    border-top: 0.5px solid var(--border);
  }
  .card-body.expanded { display: block; }

  .card-footer {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .read-more {
    font-size: 12px; color: var(--text-secondary);
    background: none; border: none; cursor: pointer;
    padding: 0; font-family: inherit;
    text-decoration: underline; text-underline-offset: 2px;
    -webkit-tap-highlight-color: transparent;
  }
  .source-link {
    font-size: 12px; color: var(--accent);
    text-decoration: none; margin-left: auto;
    display: flex; align-items: center; gap: 4px;
  }
  .source-link:hover { text-decoration: underline; }

  /* ── Loading ── */
  .loading-overlay {
    text-align: center; padding: 48px 16px;
    color: var(--text-secondary); font-size: 14px;
  }
  .loading-dots span {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: var(--text-tertiary);
    margin: 0 3px; animation: blink 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.25} 40%{opacity:1} }

  /* ── Footer ── */
  .footer {
    margin-top: 40px; padding-top: 20px;
    border-top: 0.5px solid var(--border);
    text-align: center;
    font-size: 12px; color: var(--text-tertiary);
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .site-title { font-size: 20px; }
    .card-title { font-size: 15px; }
    .header { padding: 20px 0 14px; }
    .refresh-btn { margin-left: 0; }
    .news-card { padding: 14px; }
    .pub-date { margin-left: 0; }
  }

  /* ── Fade-in animation ── */
  .news-card {
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .news-card:nth-child(1) { animation-delay: 0.05s; }
  .news-card:nth-child(2) { animation-delay: 0.10s; }
  .news-card:nth-child(3) { animation-delay: 0.15s; }
  .news-card:nth-child(4) { animation-delay: 0.20s; }
  .news-card:nth-child(5) { animation-delay: 0.25s; }
  .news-card:nth-child(6) { animation-delay: 0.30s; }
  .news-card:nth-child(7) { animation-delay: 0.35s; }
  .news-card:nth-child(8) { animation-delay: 0.40s; }
</style>
</head>
<body>
<div class="page-wrap">

  <header class="header">
    <div class="header-top">
      <span class="site-title">AI World News</span>

  <div class="controls">
    <button class="filter-btn active" onclick="filterNews('all', this)">すべて</button>

    <button class="filter-btn" onclick="filterNews('research', this)">研究</button>

    <button class="refresh-btn" id="refresh-btn" onclick="loadNews()">
      <span class="spin">↻</span> 更新

  </div>

  <div class="stats-bar" id="stats-bar" style="display:none;">
    <span class="stat">記事数: <strong id="stat-count">0</strong></span>
    <span class="stat">国: <strong id="stat-countries">0</strong></span>

  <main id="news-container">
    <div class="loading-overlay">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p style="margin-top:12px;">ニュースを読み込み中...</p>

  <footer class="footer">

    <p style="margin-top:4px;">記事の著作権は各メディアに帰属します</p>

</div>

let currentFilter = 'all';
let isLoading = false;

function getTagClass(cat) {
  return { model:'tag-model', policy:'tag-policy', business:'tag-business', research:'tag-research', safety:'tag-safety' }[cat] || 'tag-model';
}
function getTagLabel(cat) {
  return { model:'モデル', policy:'政策・規制', business:'ビジネス', research:'研究', safety:'安全性' }[cat] || cat;
}

function renderCard(a, idx) {
  return `
    <article class="news-card" data-category="${a.category}" style="animation-delay:${idx * 0.06}s">
      <div class="card-meta">
        <span class="country-flag">${a.country}</span>
        <span class="country-label">${a.countryLabel}</span>
        <span class="category-tag ${getTagClass(a.category)}">${getTagLabel(a.category)}</span>
        <span class="pub-date">📅 ${a.date}</span>
      </div>
      <h2 class="card-title">${a.titleJa}</h2>
      <p class="card-summary">${a.summary}</p>
      <p class="card-body" id="body-${a.id}">${a.body}</p>
      <div class="card-footer">
        <button class="read-more" onclick="toggleBody(${a.id}, this)">続きを読む ▾</button>
        <a class="source-link" href="${a.url}" target="_blank" rel="noopener">↗ ${a.source}</a>
      </div>
    </article>
  `;
}

function toggleBody(id, btn) {
  const body = document.getElementById('body-' + id);
  const expanded = body.classList.toggle('expanded');
  btn.textContent = expanded ? '閉じる ▴' : '続きを読む ▾';
}

function filterNews(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
}

function renderNews() {
  const container = document.getElementById('news-container');
  const filtered = currentFilter === 'all' ? ARTICLES : ARTICLES.filter(a => a.category === currentFilter);
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading-overlay">このカテゴリの記事はありません</div>';
    return;
  }
  container.innerHTML = '<div class="news-grid">' + filtered.map((a, i) => renderCard(a, i)).join('') + '</div>';
  const countries = [...new Set(ARTICLES.map(a => a.countryLabel))].length;
  document.getElementById('stat-count').textContent = filtered.length;
  document.getElementById('stat-countries').textContent = countries;
  const now = new Date();
  document.getElementById('stat-updated').textContent = now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('stats-bar').style.display = 'flex';
}

function loadNews() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  document.getElementById('news-container').innerHTML =
    '<div class="loading-overlay"><div class="loading-dots"><span></span><span></span><span></span></div><p style="margin-top:12px;">最新ニュースを取得中...</p></div>';
  const now = new Date();
  document.getElementById('updated-time').textContent =
    now.toLocaleDateString('ja-JP') + ' ' + now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) + ' 更新';
  setTimeout(() => {
    renderNews();
    isLoading = false;
    btn.classList.remove('loading');
  }, 900);
}

loadNews();
</script>
</body>
</html>
